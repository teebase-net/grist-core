name: Restore Custom Files

on:
  workflow_dispatch:
    inputs:
      zip-file:
        description: 'Upload the ZIP file containing custom files'
        type: string
        required: true

jobs:
  restore-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needs write access to commit to custom-ui
    steps:
      - name: Checkout custom-ui branch
        uses: actions/checkout@v4
        with:
          ref: custom-ui # Explicitly checkout custom-ui branch
      - name: Download uploaded ZIP
        env:
          ZIP_FILE: ${{ inputs.zip-file }}
        run: |
          echo "Downloading uploaded ZIP file"
          echo "${ZIP_FILE}" > custom-files-backup.zip
          base64 -d custom-files-backup.zip > decoded.zip
      - name: Extract ZIP to restore files
        run: |
          echo "Extracting ZIP to restore files"
          unzip -o decoded.zip -d .
          files=(
            "app/client/aclui/AccessRules.ts"
            "app/client/aclui/ACLFormulaEditor.ts"
            "app/client/components/CodeEditorPanel.ts"
            "app/client/components/LayoutTray.ts"
            "app/client/components/GristDoc.ts"
            "app/client/components/GridView.css"
            "app/client/components/GridView.js"
            "static/custom.css"
            "app/client/custom/index.js"
            "app/client/app.js"
            "app/client/components/DetailView.css"
          )
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "Restored $file to custom-ui"
            else
              echo "File $file not found in ZIP, skipping"
            fi
          done
      - name: Commit restored files to custom-ui
        run: |
          echo "Committing restored files to custom-ui"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Restore custom files to custom-ui from uploaded ZIP" || echo "No changes to commit"
          git push origin custom-ui
      - name: Log completion
        run: echo "Files restored and committed to custom-ui"
